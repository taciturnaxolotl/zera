<!DOCTYPE html>
<html>
  <head>
    <style>
      @font-face {
        font-family: "Maple Mono";
        src: url("{{fontsPath}}/maple-mono-latin-400-normal.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: "Maple Mono";
        src: url("{{fontsPath}}/maple-mono-latin-400-italic.woff2") format("woff2");
        font-weight: 400;
        font-style: italic;
      }
      @font-face {
        font-family: "Maple Mono";
        src: url("{{fontsPath}}/maple-mono-latin-700-normal.woff2") format("woff2");
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: "Maple Mono";
        src: url("{{fontsPath}}/maple-mono-latin-700-italic.woff2") format("woff2");
        font-weight: 700;
        font-style: italic;
      }

      :root {
        color-scheme: dark;
        --purple-night: oklch(18.96% 0.0242 287.67);
        --ultra-violet: oklch(42.21% 0.0676 297.45);
        --rose-quartz: oklch(65.32% 0.0585 311.96);
        --pink-puree: oklch(75.65% 0.0555 290.76);
        --lavendar-breeze: oklch(91.06% 0.0223 290.76);
        --purple-gray: oklch(25.63% 0.0002 290.76);

        --bg: var(--purple-night);
        --bg-light: var(--ultra-violet);
        --text: var(--lavendar-breeze);
        --text-light: var(--pink-puree);
        --accent: var(--rose-quartz);
        --accent-text: var(--purple-gray);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        background-color: var(--bg);
        font-family: "Maple Mono", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
        font-weight: 600;
        color: var(--text);
        position: relative;
      }

      .container {
        width: 100%;
        height: 100%;
        padding: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .type {
        position: absolute;
        top: 3rem;
        left: 3rem;
        font-size: 1.1rem;
        color: var(--text-light);
      }

      .title {
        font-size: 3.5rem;
        font-style: italic;
        font-weight: 700;
        color: var(--accent-text);
        background-color: var(--accent);
        border-bottom: 5px solid var(--bg-light);
        border-radius: 0.2em 0.2em 0.27em 0.27em;
        padding: 0.22em 0.4em;
        line-height: 1.15;
        text-align: center;
        max-width: 900px;
      }

      .author {
        position: absolute;
        bottom: 3rem;
        left: 3rem;
        font-size: 1.1rem;
        color: var(--text-light);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="type">{{type}}</span>
      <h1 class="title">{{postname}}</h1>
      <span class="author">by Kieran Klukas</span>
    </div>
  </body>
</html>
